<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inducción – Cabecera</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100%;
    overflow: hidden;
    background: #000;
  }

  .hdr {
    position: relative;
    width: 100%;
    height: 200px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    gap: 12px;
  }

  /* ── Fondo animado azul/índigo ── */
  .hdr-bg {
    position: absolute;
    inset: 0;
    background: #0a1a3d;
    z-index: 0;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    z-index: 1;
    pointer-events: none;
    filter: blur(40px);
  }
  .orb1 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #1a4fa8 0%, transparent 70%);
    top: -90px; left: 8%;
    animation: orbMove1 5s ease-in-out infinite;
  }
  .orb2 {
    width: 240px; height: 240px;
    background: radial-gradient(circle, #0d2e7a 0%, transparent 70%);
    bottom: -70px; right: 18%;
    animation: orbMove2 6s ease-in-out infinite;
  }
  .orb3 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, #2563eb 0%, transparent 70%);
    top: 10px; left: 48%;
    animation: orbMove3 7s ease-in-out infinite;
  }
  .orb4 {
    width: 160px; height: 160px;
    background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
    bottom: -40px; left: 30%;
    animation: orbMove2 8s 1s ease-in-out infinite;
  }

  @keyframes orbMove1 {
    0%, 100% { transform: translate(0,0) scale(1); opacity: 0.8; }
    33% { transform: translate(60px,30px) scale(1.15); opacity: 1; }
    66% { transform: translate(-30px,50px) scale(0.9); opacity: 0.7; }
  }
  @keyframes orbMove2 {
    0%, 100% { transform: translate(0,0) scale(1); opacity: 0.7; }
    50% { transform: translate(-70px,-40px) scale(1.2); opacity: 1; }
  }
  @keyframes orbMove3 {
    0%, 100% { transform: translate(0,0) scale(1); opacity: 0.6; }
    40% { transform: translate(40px,40px) scale(1.3); opacity: 0.95; }
    80% { transform: translate(-50px,-20px) scale(0.85); opacity: 0.5; }
  }

  .hdr-grid {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.03) 60px, rgba(255,255,255,0.03) 61px),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.03) 40px, rgba(255,255,255,0.03) 41px);
  }

  .hdr-wave {
    position: absolute; inset: 0; z-index: 3; overflow: hidden; pointer-events: none;
  }
  .hdr-wave::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0; left: -60%; width: 50%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.09), transparent);
    animation: waveSlide 4s ease-in-out infinite;
  }
  @keyframes waveSlide {
    0% { left: -60%; }
    100% { left: 140%; }
  }

  /* ── Imagen izquierda ── */
  .logo-wrap {
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    width: clamp(100px, 12vw, 158px);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: floatLogo 3.5s ease-in-out infinite;
  }
  .logo-bg {
    position: absolute;
    inset: -10px;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.80) 0%, rgba(255,255,255,0.45) 45%, transparent 75%);
    border-radius: 50%;
    z-index: 0;
    filter: blur(6px);
  }
  .logo-wrap img {
    position: relative;
    z-index: 1;
    width: 90%;
    height: auto;
    display: block;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4));
  }
  @keyframes floatLogo {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  /* ── Texto central ── */
  .hdr-text {
    position: relative;
    z-index: 10;
    flex: 1;
    min-width: 0;
    text-align: center;
    padding: 0 8px;
  }
  .hdr-pretitle {
    font-family: 'Montserrat', sans-serif;
    font-size: clamp(9px, 1.1vw, 14px);
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(147,197,253,0.85);
    margin-bottom: 2px;
  }
  .hdr-title {
    font-family: 'Bebas Neue', 'Montserrat', sans-serif;
    font-weight: 400;
    line-height: 1;
    white-space: nowrap;
    color: #ffffff;
    letter-spacing: 0.05em;
    font-size: clamp(44px, 9vw, 136px);
    animation: textGlow 3.5s ease-in-out infinite;
  }
  .hdr-title .accent { color: #93c5fd; }

  @keyframes textGlow {
    0%, 100% {
      text-shadow: 0 0 30px rgba(59,130,246,0.5), 0 0 70px rgba(37,99,235,0.2), 2px 4px 0 rgba(0,0,0,0.6);
    }
    50% {
      text-shadow: 0 0 60px rgba(99,160,255,0.9), 0 0 120px rgba(59,130,246,0.45), 2px 4px 0 rgba(0,0,0,0.6);
    }
  }

  /* ── Ícono derecho: Diploma/Estrella animada ── */
  .icon-wrap {
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    width: clamp(70px, 9vw, 118px);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: floatIcon 3.5s 0.9s ease-in-out infinite;
  }
  @keyframes floatIcon {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  .icon-svg { width: 100%; height: auto; }

  /* Pulso del círculo exterior */
  .ring-pulse {
    animation: ringPulse 2.2s ease-in-out infinite;
    transform-origin: center;
  }
  @keyframes ringPulse {
    0%, 100% { opacity: 0.5; r: 44; }
    50% { opacity: 1; r: 48; }
  }

  /* Estrella giratoria */
  .star-spin {
    animation: starSpin 8s linear infinite;
    transform-origin: center;
  }
  @keyframes starSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Brillo interior pulsante */
  .glow-pulse {
    animation: glowPulse 2.2s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* ── Línea inferior ── */
  .hdr-line {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #3b82f6 20%, #93c5fd 50%, #3b82f6 80%, transparent);
    z-index: 20;
    animation: lineGlow 2.5s ease-in-out infinite;
  }
  @keyframes lineGlow {
    0%, 100% { opacity: 0.5; height: 3px; }
    50% { opacity: 1; height: 4px; }
  }

  /* ── Partículas ── */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(147,197,253,0.45);
    z-index: 4;
    pointer-events: none;
  }
  .p1 { width: 7px; height: 7px; top: 18%; left: 28%; animation: floatP 7s 0s ease-in-out infinite; }
  .p2 { width: 5px; height: 5px; top: 68%; left: 42%; animation: floatP 9s 1s ease-in-out infinite; }
  .p3 { width: 6px; height: 6px; top: 30%; left: 58%; animation: floatP 6s 2s ease-in-out infinite; }
  .p4 { width: 4px; height: 4px; top: 72%; left: 68%; animation: floatP 8s 0.5s ease-in-out infinite; }
  .p5 { width: 6px; height: 6px; top: 22%; left: 76%; animation: floatP 10s 1.5s ease-in-out infinite; }
  @keyframes floatP {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.4; }
    50% { transform: translateY(-22px) scale(1.4); opacity: 0.85; }
  }

  /* ── RESPONSIVE MÓVIL ── */
  @media (max-width: 520px) {
    .hdr { padding: 0 10px; gap: 6px; }
    .logo-wrap { width: clamp(54px, 13vw, 72px); }
    .icon-wrap { width: clamp(48px, 11vw, 64px); }
    .hdr-title { font-size: clamp(28px, 7.8vw, 56px); }
    .hdr-pretitle { font-size: clamp(7px, 1.5vw, 10px); letter-spacing: 2px; }
  }
  @media (max-width: 360px) {
    .hdr-title { font-size: clamp(22px, 7.2vw, 40px); }
    .logo-wrap { width: 46px; }
    .icon-wrap { width: 40px; }
  }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-bg"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
  <div class="hdr-grid"></div>
  <div class="hdr-wave"></div>

  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>

  <!-- Imagen izquierda -->
  <div class="logo-wrap">
    <div class="logo-bg"></div>
    <img src="https://raw.githubusercontent.com/eulisesricky/cursosmoodle/main/0-Induccion.png" alt="Inducción" />
  </div>

  <!-- Texto central -->
  <div class="hdr-text">
    <div class="hdr-pretitle">Bienvenida al curso</div>
    <div class="hdr-title"><span class="accent">Inducción</span></div>
  </div>

  <!-- Ícono derecho: diploma animado SVG -->
  <div class="icon-wrap">
    <svg class="icon-svg" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#1e40af" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#0a1a3d" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="capGrad" cx="30%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#60a5fa"/>
          <stop offset="100%" stop-color="#1d4ed8"/>
        </radialGradient>
      </defs>

      <!-- Halo de fondo -->
      <circle cx="55" cy="55" r="50" fill="url(#bgGrad)" class="glow-pulse"/>

      <!-- Anillo exterior pulsante -->
      <circle class="ring-pulse" cx="55" cy="55" r="44"
        fill="none" stroke="rgba(147,197,253,0.6)" stroke-width="2" stroke-dasharray="8 5"/>

      <!-- Anillo interior estático -->
      <circle cx="55" cy="55" r="36"
        fill="rgba(30,64,175,0.35)" stroke="rgba(147,197,253,0.4)" stroke-width="1.5"/>

      <!-- Estrella de 8 puntas giratoria -->
      <g class="star-spin">
        <polygon points="55,22 58,50 55,54 52,50"
          fill="rgba(147,197,253,0.5)"/>
        <polygon points="55,88 58,60 55,56 52,60"
          fill="rgba(147,197,253,0.5)"/>
        <polygon points="22,55 50,52 54,55 50,58"
          fill="rgba(147,197,253,0.5)"/>
        <polygon points="88,55 60,52 56,55 60,58"
          fill="rgba(147,197,253,0.5)"/>
      </g>

      <!-- Birrete: base cuadrada -->
      <rect x="34" y="44" width="42" height="6" rx="2"
        fill="url(#capGrad)" stroke="#93c5fd" stroke-width="1"/>
      <!-- Parte superior del birrete -->
      <polygon points="55,32 78,46 55,50 32,46"
        fill="url(#capGrad)" stroke="#93c5fd" stroke-width="1"/>
      <!-- Botón central -->
      <circle cx="55" cy="46" r="3.5" fill="#bfdbfe"/>
      <!-- Cordón -->
      <line x1="72" y1="46" x2="72" y2="62" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="72" cy="64" r="4" fill="#fbbf24"/>

      <!-- Diploma debajo -->
      <rect x="38" y="56" width="34" height="22" rx="3"
        fill="rgba(30,64,175,0.7)" stroke="#93c5fd" stroke-width="1.2"/>
      <line x1="44" y1="63" x2="66" y2="63" stroke="#bfdbfe" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="44" y1="68" x2="66" y2="68" stroke="#bfdbfe" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="44" y1="73" x2="57" y2="73" stroke="#bfdbfe" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Estrella del diploma -->
      <polygon points="63,70 64.2,73.5 68,73.5 65,75.5 66.2,79 63,77 59.8,79 61,75.5 58,73.5 61.8,73.5"
        fill="#fbbf24" class="glow-pulse"/>
    </svg>
  </div>

  <div class="hdr-line"></div>
</div>

</body>
</html>
