<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informes Dinámicos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100%; overflow: hidden; background: #000; }
  .hdr {
    position: relative; width: 100%; height: 200px; overflow: hidden;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; gap: 12px;
  }
  .hdr-bg { position: absolute; inset: 0; background: #0a2e12; z-index: 0; }
  .orb { position: absolute; border-radius: 50%; z-index: 1; pointer-events: none; filter: blur(40px); }
  .orb1 { width: 300px; height: 300px; background: radial-gradient(circle, #1f9e45 0%, transparent 70%); top: -90px; left: 8%; animation: orbMove1 5s ease-in-out infinite; }
  .orb2 { width: 240px; height: 240px; background: radial-gradient(circle, #0d6e2a 0%, transparent 70%); bottom: -70px; right: 18%; animation: orbMove2 6s ease-in-out infinite; }
  .orb3 { width: 200px; height: 200px; background: radial-gradient(circle, #2db84d 0%, transparent 70%); top: 10px; left: 48%; animation: orbMove3 7s ease-in-out infinite; }
  @keyframes orbMove1 { 0%,100%{transform:translate(0,0) scale(1);opacity:.8} 33%{transform:translate(60px,30px) scale(1.15);opacity:1} 66%{transform:translate(-30px,50px) scale(.9);opacity:.7} }
  @keyframes orbMove2 { 0%,100%{transform:translate(0,0) scale(1);opacity:.7} 50%{transform:translate(-70px,-40px) scale(1.2);opacity:1} }
  @keyframes orbMove3 { 0%,100%{transform:translate(0,0) scale(1);opacity:.6} 40%{transform:translate(40px,40px) scale(1.3);opacity:.95} 80%{transform:translate(-50px,-20px) scale(.85);opacity:.5} }
  .hdr-grid { position:absolute;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,.04) 60px,rgba(255,255,255,.04) 61px),repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,.04) 40px,rgba(255,255,255,.04) 41px); }
  .hdr-wave { position:absolute;inset:0;z-index:3;overflow:hidden;pointer-events:none; }
  .hdr-wave::before { content:'';position:absolute;top:0;bottom:0;left:-60%;width:50%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent);animation:waveSlide 4s ease-in-out infinite; }
  @keyframes waveSlide { 0%{left:-60%} 100%{left:140%} }
  .logo-wrap { position:relative;z-index:10;flex-shrink:0;width:clamp(90px,11vw,148px);display:flex;align-items:center;justify-content:center;animation:floatLogo 3.5s ease-in-out infinite; }
  .logo-bg { position:absolute;inset:-10px;background:radial-gradient(ellipse at center,rgba(255,255,255,.80) 0%,rgba(255,255,255,.45) 45%,transparent 75%);border-radius:50%;z-index:0;filter:blur(6px); }
  .logo-wrap img { position:relative;z-index:1;width:90%;height:auto;display:block;filter:drop-shadow(0 4px 16px rgba(0,0,0,.4)); }
  @keyframes floatLogo { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .hdr-text { position:relative;z-index:10;flex:1;min-width:0;text-align:center;padding:0 8px; }
  .hdr-title { font-family:'Bebas Neue','Montserrat',sans-serif;font-weight:400;line-height:1;color:#fff;letter-spacing:.04em;font-size:clamp(32px,6vw,94px);animation:textGlow 3.5s ease-in-out infinite; }
  .hdr-title .accent { color:#ffffff; }
  @keyframes textGlow { 0%,100%{text-shadow:0 0 30px rgba(100,230,100,.5),0 0 70px rgba(50,200,80,.2),2px 4px 0 rgba(0,0,0,.6)} 50%{text-shadow:0 0 60px rgba(120,255,120,.85),0 0 120px rgba(60,220,90,.4),2px 4px 0 rgba(0,0,0,.6)} }
  .img-wrap { position:relative;z-index:10;flex-shrink:0;width:clamp(100px,14vw,175px);display:flex;align-items:center;justify-content:center;animation:floatImg 3.5s .8s ease-in-out infinite; }
  .img-wrap img { width:100%;height:auto;display:block;border-radius:12px;filter:drop-shadow(0 4px 20px rgba(0,0,0,.5)); }
  @keyframes floatImg { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .hdr-line { position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#7fe87f 20%,#c8ffb0 50%,#7fe87f 80%,transparent);z-index:20;animation:lineGlow 2.5s ease-in-out infinite; }
  @keyframes lineGlow { 0%,100%{opacity:.5;height:3px} 50%{opacity:1;height:4px} }
  .particle { position:absolute;border-radius:50%;background:rgba(160,240,160,.45);z-index:4;pointer-events:none; }
  .p1{width:7px;height:7px;top:18%;left:28%;animation:floatP 7s 0s ease-in-out infinite}
  .p2{width:5px;height:5px;top:68%;left:42%;animation:floatP 9s 1s ease-in-out infinite}
  .p3{width:6px;height:6px;top:30%;left:58%;animation:floatP 6s 2s ease-in-out infinite}
  .p4{width:4px;height:4px;top:72%;left:68%;animation:floatP 8s .5s ease-in-out infinite}
  @keyframes floatP { 0%,100%{transform:translateY(0) scale(1);opacity:.4} 50%{transform:translateY(-22px) scale(1.4);opacity:.85} }
  @media(max-width:520px){ .hdr{padding:0 10px;gap:6px} .logo-wrap{width:clamp(50px,12vw,68px)} .img-wrap{width:clamp(60px,13vw,80px)} .hdr-title{font-size:clamp(20px,5.5vw,40px)} }
  @media(max-width:360px){ .hdr-title{font-size:clamp(16px,5vw,30px)} .logo-wrap{width:44px} .img-wrap{width:50px} }
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-bg"></div>
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
  <div class="hdr-grid"></div><div class="hdr-wave"></div>
  <div class="particle p1"></div><div class="particle p2"></div><div class="particle p3"></div><div class="particle p4"></div>
  <div class="logo-wrap">
    <div class="logo-bg"></div>
    <img src="https://raw.githubusercontent.com/eulisesricky/cursosmoodle/main/Logo%20de%20Excel%20365%202026%20Sin%20fondo.png" alt="Excel 365"/>
  </div>
  <div class="hdr-text">
    <div class="hdr-title"><span class="accent">Informes</span> Dinámicos</div>
  </div>
  <div class="img-wrap">
    <img src="https://raw.githubusercontent.com/eulisesricky/cursosmoodle/main/3-Informes%20Din%C3%A1micos.png" alt="Informes Dinámicos"/>
  </div>
  <div class="hdr-line"></div>
</div>
</body>
</html>
