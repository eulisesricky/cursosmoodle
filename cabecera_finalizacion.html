<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finalización del Curso</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100%; overflow: hidden; background: #000; }

  .hdr {
    position: relative; width: 100%; height: 200px; overflow: hidden;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; gap: 12px;
  }

  /* ── Fondo azul/índigo igual que Inducción ── */
  .hdr-bg { position: absolute; inset: 0; background: #0a1a3d; z-index: 0; }

  .orb { position: absolute; border-radius: 50%; z-index: 1; pointer-events: none; filter: blur(40px); }
  .orb1 { width: 300px; height: 300px; background: radial-gradient(circle, #1a4fa8 0%, transparent 70%); top: -90px; left: 8%; animation: orbMove1 5s ease-in-out infinite; }
  .orb2 { width: 240px; height: 240px; background: radial-gradient(circle, #0d2e7a 0%, transparent 70%); bottom: -70px; right: 18%; animation: orbMove2 6s ease-in-out infinite; }
  .orb3 { width: 200px; height: 200px; background: radial-gradient(circle, #2563eb 0%, transparent 70%); top: 10px; left: 48%; animation: orbMove3 7s ease-in-out infinite; }
  .orb4 { width: 160px; height: 160px; background: radial-gradient(circle, #7c3aed 0%, transparent 70%); bottom: -40px; left: 30%; animation: orbMove2 8s 1s ease-in-out infinite; }

  @keyframes orbMove1 { 0%,100%{transform:translate(0,0) scale(1);opacity:.8} 33%{transform:translate(60px,30px) scale(1.15);opacity:1} 66%{transform:translate(-30px,50px) scale(.9);opacity:.7} }
  @keyframes orbMove2 { 0%,100%{transform:translate(0,0) scale(1);opacity:.7} 50%{transform:translate(-70px,-40px) scale(1.2);opacity:1} }
  @keyframes orbMove3 { 0%,100%{transform:translate(0,0) scale(1);opacity:.6} 40%{transform:translate(40px,40px) scale(1.3);opacity:.95} 80%{transform:translate(-50px,-20px) scale(.85);opacity:.5} }

  .hdr-grid { position:absolute;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,.03) 60px,rgba(255,255,255,.03) 61px),repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,.03) 40px,rgba(255,255,255,.03) 41px); }

  .hdr-wave { position:absolute;inset:0;z-index:3;overflow:hidden;pointer-events:none; }
  .hdr-wave::before { content:'';position:absolute;top:0;bottom:0;left:-60%;width:50%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.09),transparent);animation:waveSlide 4s ease-in-out infinite; }
  @keyframes waveSlide { 0%{left:-60%} 100%{left:140%} }

  /* ── Imagen izquierda ── */
  .logo-wrap {
    position: relative; z-index: 10; flex-shrink: 0;
    width: clamp(100px, 12vw, 158px);
    display: flex; align-items: center; justify-content: center;
    animation: floatLogo 3.5s ease-in-out infinite;
  }
  .logo-bg {
    position: absolute; inset: -10px;
    background: radial-gradient(ellipse at center, rgba(255,255,255,.80) 0%, rgba(255,255,255,.45) 45%, transparent 75%);
    border-radius: 50%; z-index: 0; filter: blur(6px);
  }
  .logo-wrap img { position:relative;z-index:1;width:90%;height:auto;display:block;filter:drop-shadow(0 4px 20px rgba(0,0,0,.5)); }
  @keyframes floatLogo { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

  /* ── Texto central ── */
  .hdr-text { position:relative;z-index:10;flex:1;min-width:0;text-align:center;padding:0 8px; }
  .hdr-pretitle {
    font-family:'Montserrat',sans-serif;
    font-size:clamp(9px,1.1vw,13px);
    font-weight:700;letter-spacing:4px;text-transform:uppercase;
    color:rgba(147,197,253,.85);margin-bottom:2px;
  }
  .hdr-title {
    font-family:'Bebas Neue','Montserrat',sans-serif;
    font-weight:400;line-height:1;white-space:nowrap;
    color:#fff;letter-spacing:.04em;
    font-size:clamp(34px,7vw,112px);
    animation:textGlow 3.5s ease-in-out infinite;
  }
  .hdr-title .accent { color:#ffffff; }
  @keyframes textGlow {
    0%,100%{text-shadow:0 0 30px rgba(59,130,246,.5),0 0 70px rgba(37,99,235,.2),2px 4px 0 rgba(0,0,0,.6)}
    50%{text-shadow:0 0 60px rgba(99,160,255,.9),0 0 120px rgba(59,130,246,.45),2px 4px 0 rgba(0,0,0,.6)}
  }

  /* ── Imagen derecha ── */
  .img-wrap {
    position:relative;z-index:10;flex-shrink:0;
    width:clamp(100px,13vw,165px);
    display:flex;align-items:center;justify-content:center;
    animation:floatImg 3.5s .8s ease-in-out infinite;
  }
  .img-wrap img { width:100%;height:auto;display:block;filter:drop-shadow(0 4px 24px rgba(0,0,0,.6)); }
  @keyframes floatImg { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

  /* ── Línea inferior ── */
  .hdr-line {
    position:absolute;bottom:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,transparent,#3b82f6 20%,#93c5fd 50%,#3b82f6 80%,transparent);
    z-index:20;animation:lineGlow 2.5s ease-in-out infinite;
  }
  @keyframes lineGlow { 0%,100%{opacity:.5;height:3px} 50%{opacity:1;height:4px} }

  /* ── Partículas ── */
  .particle { position:absolute;border-radius:50%;background:rgba(147,197,253,.45);z-index:4;pointer-events:none; }
  .p1{width:7px;height:7px;top:18%;left:28%;animation:floatP 7s 0s ease-in-out infinite}
  .p2{width:5px;height:5px;top:68%;left:42%;animation:floatP 9s 1s ease-in-out infinite}
  .p3{width:6px;height:6px;top:30%;left:58%;animation:floatP 6s 2s ease-in-out infinite}
  .p4{width:4px;height:4px;top:72%;left:68%;animation:floatP 8s .5s ease-in-out infinite}
  .p5{width:6px;height:6px;top:22%;left:76%;animation:floatP 10s 1.5s ease-in-out infinite}
  @keyframes floatP { 0%,100%{transform:translateY(0) scale(1);opacity:.4} 50%{transform:translateY(-22px) scale(1.4);opacity:.85} }

  /* ── Responsive ── */
  @media(max-width:520px){ .hdr{padding:0 10px;gap:6px} .logo-wrap{width:clamp(54px,13vw,72px)} .img-wrap{width:clamp(60px,13vw,80px)} .hdr-title{font-size:clamp(24px,6.5vw,48px)} .hdr-pretitle{letter-spacing:2px} }
  @media(max-width:360px){ .hdr-title{font-size:clamp(20px,6vw,36px)} .logo-wrap{width:46px} .img-wrap{width:50px} }
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-bg"></div>
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div><div class="orb orb4"></div>
  <div class="hdr-grid"></div>
  <div class="hdr-wave"></div>
  <div class="particle p1"></div><div class="particle p2"></div><div class="particle p3"></div><div class="particle p4"></div><div class="particle p5"></div>

  <!-- Imagen izquierda -->
  <div class="logo-wrap">
    <div class="logo-bg"></div>
    <img src="https://raw.githubusercontent.com/eulisesricky/cursosmoodle/main/Finalizacion_Curso.png" alt="Finalización del Curso"/>
  </div>

  <!-- Texto central -->
  <div class="hdr-text">
    <div class="hdr-pretitle">¡Felicitaciones!</div>
    <div class="hdr-title">Finalización <span class="accent">del Curso</span></div>
  </div>

  <!-- Imagen derecha (misma imagen espejada para simetría) -->
  <div class="img-wrap">
    <img src="https://raw.githubusercontent.com/eulisesricky/cursosmoodle/main/Finalizacion_Curso.png" alt="Finalización del Curso" style="transform:scaleX(-1);"/>
  </div>

  <div class="hdr-line"></div>
</div>
</body>
</html>
