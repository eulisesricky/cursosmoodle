<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel Básico – Cabecera</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100%;
    overflow: hidden;
    background: #000;
  }

  .hdr {
    position: relative;
    width: 100%;
    height: 200px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    gap: 12px;
  }

  /* ── Fondo animado ── */
  .hdr-bg {
    position: absolute;
    inset: 0;
    background: #0a2e12;
    z-index: 0;
  }

  /* Orbes de color que se mueven notoriamente */
  .orb {
    position: absolute;
    border-radius: 50%;
    z-index: 1;
    pointer-events: none;
    filter: blur(38px);
  }
  .orb1 {
    width: 280px; height: 280px;
    background: radial-gradient(circle, #1f9e45 0%, transparent 70%);
    top: -80px; left: 10%;
    animation: orbMove1 5s ease-in-out infinite;
  }
  .orb2 {
    width: 220px; height: 220px;
    background: radial-gradient(circle, #0d6e2a 0%, transparent 70%);
    bottom: -60px; right: 20%;
    animation: orbMove2 6s ease-in-out infinite;
  }
  .orb3 {
    width: 180px; height: 180px;
    background: radial-gradient(circle, #2db84d 0%, transparent 70%);
    top: 20px; left: 50%;
    animation: orbMove3 7s ease-in-out infinite;
  }

  @keyframes orbMove1 {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.8; }
    33% { transform: translate(60px, 30px) scale(1.15); opacity: 1; }
    66% { transform: translate(-30px, 50px) scale(0.9); opacity: 0.7; }
  }
  @keyframes orbMove2 {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.7; }
    50% { transform: translate(-70px, -40px) scale(1.2); opacity: 1; }
  }
  @keyframes orbMove3 {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.6; }
    40% { transform: translate(40px, 40px) scale(1.3); opacity: 0.95; }
    80% { transform: translate(-50px, -20px) scale(0.85); opacity: 0.5; }
  }

  /* Grid sutil sobre fondo */
  .hdr-grid {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.04) 60px, rgba(255,255,255,0.04) 61px),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.04) 40px, rgba(255,255,255,0.04) 41px);
  }

  /* Onda luminosa */
  .hdr-wave {
    position: absolute; inset: 0; z-index: 3; overflow: hidden; pointer-events: none;
  }
  .hdr-wave::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: -60%;
    width: 50%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent);
    animation: waveSlide 4s ease-in-out infinite;
  }
  @keyframes waveSlide {
    0% { left: -60%; }
    100% { left: 140%; }
  }

  /* ── Logo izquierdo ── */
  .logo-wrap {
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    width: clamp(90px, 11vw, 148px);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: floatLogo 3.5s ease-in-out infinite;
  }

  /* Fondo difuminado verde muy claro detrás del logo */
  .logo-bg {
    position: absolute;
    inset: -10px;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.80) 0%, rgba(255,255,255,0.45) 45%, transparent 75%);
    border-radius: 50%;
    z-index: 0;
    filter: blur(6px);
  }

  .logo-wrap img {
    position: relative;
    z-index: 1;
    width: 90%;
    height: auto;
    display: block;
  }

  @keyframes floatLogo {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  /* ── Texto central ── */
  .hdr-text {
    position: relative;
    z-index: 10;
    flex: 1;
    min-width: 0;
    text-align: center;
    padding: 0 8px;
  }
  .hdr-title {
    font-family: 'Bebas Neue', 'Montserrat', sans-serif;
    font-weight: 400;
    line-height: 1;
    white-space: nowrap;
    color: #ffffff;
    letter-spacing: 0.04em;
    /* Tamaño fluido que se ajusta al contenedor */
    font-size: clamp(40px, 8.5vw, 130px);
    animation: textGlow 3.5s ease-in-out infinite;
  }
  .hdr-title .accent { color: #7fe87f; }

  @keyframes textGlow {
    0%, 100% {
      text-shadow: 0 0 30px rgba(100,230,100,0.5), 0 0 70px rgba(50,200,80,0.2), 2px 4px 0 rgba(0,0,0,0.6);
    }
    50% {
      text-shadow: 0 0 60px rgba(120,255,120,0.85), 0 0 120px rgba(60,220,90,0.4), 2px 4px 0 rgba(0,0,0,0.6);
    }
  }

  /* ── Batería derecha ── */
  .battery-wrap {
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    width: clamp(70px, 9vw, 120px);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: floatBat 3.5s 0.8s ease-in-out infinite;
  }
  @keyframes floatBat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }
  .battery-svg { width: 100%; height: auto; }

  .bar1 { animation: barPulse 1.8s ease-in-out infinite; }
  @keyframes barPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  .bar-empty {
    fill: rgba(255,255,255,0.08);
    stroke: rgba(255,255,255,0.3);
    stroke-width: 1.5;
  }

  /* ── Línea inferior ── */
  .hdr-line {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, #7fe87f 20%, #c8ffb0 50%, #7fe87f 80%, transparent);
    z-index: 20;
    animation: lineGlow 2.5s ease-in-out infinite;
  }
  @keyframes lineGlow {
    0%, 100% { opacity: 0.5; height: 3px; }
    50% { opacity: 1; height: 4px; }
  }

  /* ── Partículas ── */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(160,240,160,0.45);
    z-index: 4;
    pointer-events: none;
  }
  .p1 { width: 7px; height: 7px; top: 18%; left: 28%; animation: floatP 7s 0s ease-in-out infinite; }
  .p2 { width: 5px; height: 5px; top: 68%; left: 42%; animation: floatP 9s 1s ease-in-out infinite; }
  .p3 { width: 6px; height: 6px; top: 30%; left: 58%; animation: floatP 6s 2s ease-in-out infinite; }
  .p4 { width: 4px; height: 4px; top: 72%; left: 68%; animation: floatP 8s 0.5s ease-in-out infinite; }
  .p5 { width: 6px; height: 6px; top: 22%; left: 76%; animation: floatP 10s 1.5s ease-in-out infinite; }
  @keyframes floatP {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.4; }
    50% { transform: translateY(-22px) scale(1.4); opacity: 0.8; }
  }

  /* ── RESPONSIVE MÓVIL ── */
  @media (max-width: 520px) {
    .hdr {
      padding: 0 10px;
      gap: 6px;
    }
    .logo-wrap {
      width: clamp(54px, 13vw, 72px);
    }
    .logo-bg {
      border-radius: 10px;
      inset: -4px;
    }
    .battery-wrap {
      width: clamp(50px, 12vw, 68px);
    }
    .hdr-title {
      font-size: clamp(26px, 7.5vw, 56px);
      letter-spacing: 0.02em;
    }
  }

  @media (max-width: 360px) {
    .hdr-title {
      font-size: clamp(22px, 7vw, 44px);
    }
    .logo-wrap { width: 48px; }
    .battery-wrap { width: 44px; }
  }
</style>
</head>
<body>

<div class="hdr">
  <!-- Fondo y efectos -->
  <div class="hdr-bg"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="hdr-grid"></div>
  <div class="hdr-wave"></div>

  <!-- Partículas -->
  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>

  <!-- Logo izquierdo con fondo blanco -->
  <div class="logo-wrap">
    <div class="logo-bg"></div>
    <img
      src="https://raw.githubusercontent.com/eulisesricky/cursosmoodle/main/Logo%20de%20Excel%20365%202026%20Sin%20fondo.png"
      alt="Excel 365"
    />
  </div>

  <!-- Texto central -->
  <div class="hdr-text">
    <div class="hdr-title">Excel&nbsp;<span class="accent">Básico</span></div>
  </div>

  <!-- Batería derecha -->
  <div class="battery-wrap">
    <svg class="battery-svg" viewBox="0 0 130 72" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="8" width="116" height="56" rx="10" ry="10"
        fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3.5"/>
      <rect x="118" y="26" width="10" height="20" rx="3"
        fill="rgba(255,255,255,0.75)"/>
      <!-- Barra 1 llena con parpadeo -->
      <rect class="bar1" x="11" y="17" width="28" height="38" rx="5"
        fill="#5ee87a" stroke="#3fc060" stroke-width="1.5"/>
      <rect class="bar1" x="14" y="20" width="8" height="14" rx="3"
        fill="rgba(255,255,255,0.4)"/>
      <!-- Barras vacías -->
      <rect class="bar-empty" x="46" y="17" width="28" height="38" rx="5"/>
      <rect class="bar-empty" x="81" y="17" width="28" height="38" rx="5"/>
    </svg>
  </div>

  <div class="hdr-line"></div>
</div>

</body>
</html>
